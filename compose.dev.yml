services:
  mission-control-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mission-control-dev
    working_dir: /workspace
    ports:
      - "3000:3000"
    environment:
      HOME: /home/luke
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      GOG_ACCOUNT: ${GOG_ACCOUNT:-tonybigclawbowski@gmail.com}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      OPENCLAW_PATH: ${OPENCLAW_PATH:-/usr/local/bin/openclaw}
      GOG_PATH: ${GOG_PATH:-/usr/local/bin/gog}
    volumes:
      - .:/workspace
      - mission-control-node-modules:/workspace/node_modules
      - mission-control-next:/workspace/.next
      - /usr/local/bin/openclaw:/usr/local/bin/openclaw:ro
      - /usr/local/bin/gog:/usr/local/bin/gog:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /etc/ca-certificates:/etc/ca-certificates:ro
      - /home/luke/.openclaw:/home/luke/.openclaw:ro
      - /home/luke/.config/gogcli:/home/luke/.config/gogcli:ro
      - /home/luke/go:/home/luke/go:ro
    restart: unless-stopped

volumes:
  mission-control-node-modules:
  mission-control-next:
